server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: booking-service
          uri: ${BOOKING_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/bookings/**
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/inventory/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/payments/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
